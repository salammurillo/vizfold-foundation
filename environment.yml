name: openfold_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pytorch=2.5.1
  - pytorch-cuda=12.4
  # Build tools — use conda cross-compiler; system GCC is used at build time
  - gxx_linux-64
  - gcc_linux-64
  - libstdcxx-ng
  - sysroot_linux-64=2.17
  - make
  - ninja
  # CUDA development headers and libraries
  - nvidia::cuda-nvcc=12.4
  - nvidia::cuda-libraries-dev=12.4
  - nvidia::cuda-cudart-dev=12.4
  - nvidia::cuda-driver-dev=12.4
  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - tqdm
  - pyyaml
  - requests
  - typing-extensions
  # ML / framework dependencies
  - wandb
  - pytorch-lightning
  # Structural biology tools
  - openmm
  - pdbfixer
  - biopython
  - modelcif==0.7
  # Sequence search databases and tools
  - bioconda::hmmer
  - bioconda::hhsuite
  - bioconda::kalign2
  # Utilities
  - awscli
  - ml-collections
  - aria2
  - git
  - pip
  - packaging